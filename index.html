<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel & Petal - Image Gallery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet"/>
</head>
<body>

    <!-- HEADER -->
     <header>
        <div class="logo">Pixel <span>&</span> Petal</div>
        <div class="header-tag">Image Gallery</div>
     </header>

     <!-- HERO -->
      <section class="hero">
        <div class="hero-inner">
          <p class="hero-eyebrow">Curated Visual Archive</p>
         <h1>Where <em>circuits</em><br>meet nature</h1>
         <p>A hand-picked collection of technology and the natural world - from server rooms to forest floors, PCB traces to leaf veins.</p>
    </div>
    </section>

    <!-- FILTER BAR -->
     <div class="filter-wrap">
       <div class="filter-bar" role="tablist" aria-label="Filter by category">
         <button class="filter-btn active" data-cat="all"      role="tab" aria-selected="true">All Photos</button>
        <button class="filter-btn"        data-cat="nature"   role="tab" aria-selected="false">🌿 Nature</button>
        <button class="filter-btn"        data-cat="tech"     role="tab" aria-selected="false">⚡ Technology</button>
        <button class="filter-btn"        data-cat="abstract" role="tab" aria-selected="false">✦ Abstract</button>
    </div>
     </div>

     <!-- PHOTO COUNT -->
      <div class="count-bar"><span id="count-label">18 Photos</span></div>

      <!-- GALLERY GRID (CARDS INJECTED BY JS) -->
       <section class="gallery-grid" id="gallery" aria-label="Photo gallery"></section>

       <!-- LIGHTBOX -->
    <div id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
       <button class="lb-close" id="lb-close" aria-label="Close">✕</button>
       <div class="lb-inner">
         <div class="lb-img-wrap">
           <button class="lb-btn" id="lb-prev" aria-label="Previous image">‹</button>
           <img id="lb-image" src="" alt="" />
           <button class="lb-btn" id="lb-next" aria-label="Next image">›</button>
      </div>
      <div class="lb-info">
        <span class="lb-title" id="lb-title"></span>
        <span class="lb-counter" id="lb-counter"></span>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
   <footer>
    <strong>Pixel  &amp; Petal </strong> - Images sourced from Unsplash (free to use under Unsplash License)
   </footer>

    
   <script src="script.js"></script>
</body>
</html>
